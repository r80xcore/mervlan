<h2>GETTING STARTED WITH MERVLAN</h2>
<span class="sep">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</span>
<p class="intro">MerVLAN is a VLAN management addon for Asuswrt-Merlin. It manages VLAN bridges, ebtables rules, and SSID-to-bridge bindings — locally on a single router or across multiple devices over SSH. Below is an overview of the supported network topologies before you start configuring.</p>

<span class="sep">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</span>
<h2>NETWORK TOPOLOGIES</h2>

<div class="note-box" style="border-color:#E74C3C; background:#1a0808; color:#E74C3C;">
  <strong>⛔ WIRELESS BACKHAUL IS NOT SUPPORTED</strong><br>
  Wi-Fi backhaul cannot carry 802.1Q VLAN tags on Asus hardware. <strong>Ethernet backhaul is required between all devices in every topology.</strong> If any device in your setup connects to the main router over Wi-Fi, VLAN traffic will not be isolated correctly and the configuration will not work.
</div>

<div class="scenario-block">
  <strong>1 — Single Device</strong>
  MerVLAN is installed and configured on one router. No additional devices. VLANs are applied locally — no SSH, no nodes, no sync needed. Connects to a managed switch via Ethernet (WAN port). This is the simplest and most common use case.
</div>

<div class="scenario-block">
  <strong>2 — Single Device with AiMesh Nodes</strong>
  MerVLAN is installed and configured on the main router only. AiMesh nodes are added in the Nodes panel. SSH keys are generated and installed on the main router and automatically propagated to AiMesh nodes by the Asus firmware after a reboot — no manual key installation required on the nodes. All devices must be connected to a managed switch via Ethernet (WAN port). Apply reaches all nodes over SSH.
</div>

<div class="scenario-block">
  <strong>3 — Single Device with Standalone APs (AP Mode)</strong>
  MerVLAN is installed and configured on the main/master router. Standalone APs (non-AiMesh, running in AP mode) are added as nodes. Because these APs are not part of an AiMesh mesh, <strong>SSH keys must be manually installed on each AP</strong> — the firmware does not propagate them automatically. All devices must be connected to a managed switch via Ethernet (WAN port).
</div>

<div class="scenario-block">
  <strong>4 — Daisy-Chained Nodes via Trunk Ports <span class="tag-warn">EXPERIMENTAL</span></strong>
  An extension of topologies 2 or 3 where downstream APs are connected in a daisy-chain over Ethernet (e.g. switch → AP → AP) rather than all plugging directly into the same switch. The ports connecting devices must be configured as 802.1Q trunk ports in MerVLAN's LAN Setup, with the correct tagged VLANs. This is still early experimental — success is not guaranteed at this stage.
</div>

<span class="sep">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</span>
<div class="note-box">
  <strong>⚠️ DRY RUN IS ON BY DEFAULT</strong><br>
  When you first install MerVLAN, Dry Run mode is enabled. Clicking [Apply] simulates the configuration but makes <strong>NO actual changes</strong> to your network.<br><br>
  Before your first real apply: <strong>General Settings → Disable "Dry Run" → Save Settings</strong><br>
  You can re-enable it anytime to safely test a new config before committing it.
</div>

<span class="sep">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</span>
<h2>GENERAL SETTINGS — THREE TOGGLES</h2>
<p>Review these three global toggles in the General Settings panel before your first apply.</p>
<table class="device-table">
  <thead><tr><th>Toggle</th><th>Default</th><th>What it does</th></tr></thead>
  <tbody>
    <tr><td><strong>DRY RUN</strong></td><td><span class="tag-warn">ON</span></td><td>Simulates apply without touching the network. Disable when ready to go live.</td></tr>
    <tr><td><strong>STP</strong></td><td><span class="tag-off">OFF</span></td><td>Spanning Tree Protocol — prevents loops in multi-node topologies. Leave OFF for single-router setups.</td></tr>
    <tr><td><strong>ENS</strong></td><td><span class="tag-off">OFF</span></td><td>Enable Native SSID — allows VLANs on base radios (wl0, wl1). Most users do not need this; use Guest Network SSIDs instead. See the SSID Setup tab for more details.</td></tr>
  </tbody>
</table>

<span class="sep">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</span>
<h2>SERVICE BUTTONS — BOOT &amp; HEALTH</h2>
<p>Boot persistence and the automatic VLAN health monitor are controlled together by three buttons in the General Settings panel.</p>
<table class="device-table">
  <thead><tr><th>Button</th><th>What it does</th></tr></thead>
  <tbody>
    <tr>
      <td><strong>Enable Service</strong></td>
      <td>Injects MerVLAN into <code>services-start</code> so VLANs are re-applied on every reboot, and activates the cron-based health monitor on the main router and all configured nodes.</td>
    </tr>
    <tr>
      <td><strong>Disable Service</strong></td>
      <td>Removes the <code>services-start</code> boot entry and disables the health cron on the main router and all nodes. The service-event heal hook is left in place.</td>
    </tr>
    <tr>
      <td><strong>Service Status</strong></td>
      <td>Polls the main router and every configured node and prints their current service state to the CLI log.</td>
    </tr>
  </tbody>
</table>
<p><strong>Service Status output example:</strong></p>
<div class="log-sample">Status:
&lt;--- Main Unit ---&gt;
RT-AX95Q boot=enabled addon=active service-event=active cron=present is_node=no
&lt;--- Configured Nodes ---&gt;
RT-AX95Q 192.168.186.201:boot=enabled addon=node-on event=active cron=present is_node=yes</div>
<div class="info-box">
  <strong>Field meanings:</strong><br>
  <strong>boot</strong> — enabled/disabled (services-start injection)<br>
  <strong>addon</strong> — active (running on main) · node-on (running on node) · missing (MerVLAN not found)<br>
  <strong>service-event</strong> — active (heal hook installed) · disabled · custom (modified externally)<br>
  <strong>cron</strong> — present (health job scheduled) · absent<br>
  <strong>is_node</strong> — yes/no (indicates if the unit is a node)
</div>

<span class="sep">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</span>
<h2>SETUP CHECKLIST — Single Router</h2>
<ol>
  <li><strong>Review General Settings</strong>
    <ul>
      <li>Confirm hardware profile detected (shown in the UI badge)</li>
      <li>Disable Dry Run when ready to apply for real</li>
    </ul>
  </li>
  <li><strong>Configure SSIDs</strong> — see the SSID Setup tab
    <ul><li>Map each Guest SSID to a VLAN ID and set AP Isolation</li></ul>
  </li>

  <li><strong>Apply</strong> — click [Apply VLAN Manager] and watch the CLI log</li>
</ol>
<div class="info-box">✅ VLANs are now live! Once your config is confirmed working, click <strong>Enable Service</strong> to make it persist across reboots.You can monitor the active VLANs in the INFO panel (see "Logs & Monitoring" for details).</div>

<span class="sep">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</span>
<h2>SETUP CHECKLIST — Multi-Node (AiMesh or Full AP)</h2>
<ol>
  <li><strong>Install SSH Keys</strong> — click [SSH Keys Install]
    <ul>
      <li>Copy the public key from the CLI log</li>
      <li>AiMesh nodes: paste the key into the main router's Administration → System → Authorized Keys, then reboot each AiMesh node</li>
      <li>Full AP nodes: paste the key into each AP's Administration → System → Authorized Keys individually</li>
    </ul>
  </li>
  <li><strong>Add Your Nodes</strong>
    <ul>
      <li>Enter each node's IP in the Nodes panel, rename if desired</li>
      <li>Click [Save Settings] before syncing</li>
    </ul>
  </li>
  <li><strong>Sync Nodes</strong> — click [Sync Nodes]
    <ul>

  </li>
  <li><strong>Configure SSIDs</strong> — map SSIDs to VLANs and assign to the correct nodes</li>
  <li><strong>Configure LAN Ports</strong> if needed</li>
  <li><strong>Save Settings</strong></li>
  <li><strong>Apply</strong> — choose "Local + Nodes" and watch the CLI log</li>
</ol>
<div class="info-box">✅ VLANs are now live! Once your config is confirmed working, click <strong>Enable Service</strong> to make it persist across reboots.You can monitor the active VLANs in the INFO panel (see "Logs & Monitoring" for details).</div>

<span class="sep">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</span>

      ssid: `<div class="help-section">
<h2>SSID CONFIGURATION</h2>
<span class="sep">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</span>
<p class="intro">MerVLAN follows this flow for each SSID slot. Up to 12 slots are available — leave a slot blank to skip it.</p>
<div class="flow-bar">SSID Name &nbsp;→&nbsp; VLAN ID &nbsp;→&nbsp; AP Isolation &nbsp;→&nbsp; Node Assignment</div>

<span class="sep">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</span>
<h2>SSID NAME</h2>
<ul>
  <li>Enter the exact SSID name from your router's Wireless settings</li>
  <li>The SSID must already exist and be enabled — looked up by name</li>
  <li>Leave blank to skip that slot</li>
  <li>Status: ✅ Found &nbsp;|&nbsp; ❌ Not found</li>
</ul>
<div class="note-box">
  <strong>⚠️ GUEST NETWORK SSIDs ARE STRONGLY RECOMMENDED</strong><br><br>
  Your router has <strong>base radios</strong> (your primary "HomeNet_2G" / "HomeNet_5G" SSIDs) and <strong>Guest Network interfaces</strong> (wl0.1, wl1.1, etc.) created under Wireless → Guest Network in the Asus UI.<br><br>
  MerVLAN is designed to work with Guest Network SSIDs. Assigning a VLAN to a base radio requires enabling <strong>ENS (Enable Native SSID)</strong> in General Settings. Without ENS, base radio SSIDs are silently skipped with a warning in the log.
</div>
<div class="info-box">
  <strong>Why Guest SSIDs are safer — the br0 removal problem</strong><br><br>
  When MerVLAN assigns a VLAN to any SSID, it must first remove that wireless interface from <code>br0</code> (the router's default LAN bridge) and attach it to a dedicated VLAN bridge instead.<br><br>
  Guest Network interfaces (wl0.1, wl1.1, etc.) handle this cleanly. <strong>Base radios (wl0, wl1, wl2) do not behave consistently.</strong> Depending on the router model and firmware version, removing a base radio from br0 can trigger the Asus wireless subsystem to:<br>
  <ul style="margin-top:6px;">
    <li>Silently move the interface back into br0 on the next wireless event</li>
    <li>Only partially complete the bridge change, leaving the radio in an inconsistent state</li>
    <li>Trigger a full wireless restart that drops all clients briefly</li>
  </ul>
  <br>
  <strong>You are free to try base radios with ENS enabled</strong> — some models handle it just fine. But if you notice your main SSID losing VLAN isolation, dropping clients unexpectedly, or the heal system triggering repeatedly, this is most likely why.<br><br>
  <strong>Best practice:</strong> Create a dedicated Guest SSID for each VLAN segment and map those here. Leave your main SSID on the default br0.
</div>

<span class="sep">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</span>

<ul>

<span class="sep">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</span>
<h2>AP ISOLATION</h2>
<ul>

  <li><strong>OFF</strong> — Clients on the same VLAN can communicate normally</li>
  <li>Recommended ON for Guest and IoT networks</li>

    <tr><td>RT-AX92U</td><td>4</td><td></td></tr>
    <tr><td>RT-AC86U</td><td>4</td><td></td></tr>
    <tr><td>RT-AX82U</td><td>4</td><td></td></tr>

    <tr><td>RT-AX95Q</td><td>3</td><td></td></tr>

    <tr><td>RT-BE92U</td><td>1&nbsp;(shared)</td><td class="note-cell">⚠️ LAN 1–4 share one VLAN bridge — no per-port isolation</td></tr>
  </tbody>

<p>These devices are auto-detected on startup — no manual configuration needed. More profiles are added with each release.</p>

<div class="note-box">
  <strong>⚠️ RT-BE92U — Hardware Limitation</strong><br>
  Due to the internal switch design on this model, all four physical LAN ports share a single
  VLAN-capable interface. Only one VLAN ID can be assigned and it applies to LAN 1–4 as a group.
  Per-port VLAN isolation is not supported on this model.
</div>

<span class="sep">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</span>

<h2>IF YOUR DEVICE IS NOT LISTED</h2>

<p>MerVLAN will still attempt to run, but port assignments may be incorrect or incomplete.
Use the APMO modal to configure your hardware profile manually.</p>

<p><strong>How to access APMO:</strong></p>
<ul>
  <li>Click the <strong>[Experimental]</strong> badge or hardware status indicator in the main UI header</li>
</ul>

<p><strong>In the APMO modal you can:</strong></p>
<ul>
  <li>Map each ethX interface to the correct LAN port label</li>
  <li>Set the correct WAN interface (e.g., eth0 or eth4)</li>
  <li>Confirm the LAN port count</li>
  <li>Save the profile — stored in settings.json, persists across MerVLAN updates</li>
</ul>

<p><strong>Tips for identifying your port layout:</strong></p>
<ul>
  <li>Connect one device at a time to each LAN port and note the interface</li>
  <li>Check the Asus product page for your model's port-to-chip mapping</li>
  <li>Ask on Discord or SNB Forums — others may have already mapped your device</li>
</ul>

<span class="sep">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</span>

<h2>SKIPPING APMO</h2>

<p>Without a hardware profile, MerVLAN will guess port mappings from available interfaces. This may lead to:</p>
<ul>
  <li>Wrong VLAN assigned to the wrong physical port</li>
  <li>WAN port misidentified — <strong>this breaks internet connectivity</strong></li>
  <li>Trunk configuration applied on the wrong interface</li>
  <li>SSIDs binding correctly while wired VLANs fail silently</li>
</ul>
<p>At minimum, verify the WAN interface is correct before applying.</p>

<span class="sep">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</span>

<h2>SHARING YOUR PROFILE</h2>

<p>Got a working APMO profile for an unlisted device? Please share it — it can be built into a future release.</p>
<ul>
  <li>Post the ethX mapping on SNB Forums or Discord</li>
  <li>Open a GitHub Issue with your PRODUCTID and port layout</li>
  <li>Include firmware version and your test results</li>
</ul>
<p>See the "Get Help" tab for all links.</p>

</div>`,

      ssh: `<div class="help-section">
<h2>SSH KEY INSTALL</h2>
<span class="sep">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</span>
<p class="intro">SSH keys are required for multi-node setups. MerVLAN uses them to connect from the main router to each node and apply VLAN configuration remotely. The key must be manually installed on each node — MerVLAN does not inject it automatically.</p>

<span class="sep">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</span>
<h2>HOW IT WORKS</h2>
<p>Clicking <strong>[SSH Keys Install]</strong> generates an ED25519 key pair on the main router and displays the public key in the CLI log. You then copy that key and paste it manually into the Authorized Keys field on each node via the Asus web UI.</p>
<div class="info-box">
  <strong>One-way trust by design</strong><br><br>
  The private key lives only on the main router and is never copied to nodes. Nodes hold the public key — this allows the main router to authenticate <em>to</em> them via SSH, but nodes cannot SSH back to the main router using this key pair. This is intentional: the main router initiates all connections, and there is no risk of key accumulation or duplicate injection because you control exactly where the public key is pasted.
</div>

<span class="sep">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</span>
<h2>STEP 1 — GENERATE THE KEY PAIR</h2>
<ol>
  <li>Click <strong>[SSH Keys Install]</strong> in the Nodes panel</li>
  <li>The public key is printed in the CLI log — it is a single line starting with <code>ssh-ed25519</code></li>
  <li>Copy that full line — you will paste it on each node in the next step</li>
</ol>
<div class="info-box">
  If a key pair already exists, the script reuses it and prints the existing public key. You do not need to re-install it on nodes unless the key was regenerated.
</div>

<span class="sep">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</span>
<h2>STEP 2 — AIMESH NODES</h2>
<p>For AiMesh nodes that are managed by this router, Asus handles key propagation — but only during the node's boot process.</p>
<ol>
  <li>On the <strong>main router</strong>, go to:<br>
    <strong>Administration → System → Authorized Keys</strong></li>
  <li>Paste the public key and save</li>
  <li><strong>Reboot each AiMesh node</strong> — Asus syncs authorized keys to nodes during their boot; the key will not be active until the node has rebooted</li>
</ol>
<div class="note-box">
  <strong>⚠️ AiMesh nodes need a reboot to pick up the key.</strong><br><br>
  The main router does <strong>not</strong> need to be rebooted. Only the AiMesh nodes do. After they come back up, MerVLAN will be able to connect to them via SSH.
</div>

<span class="sep">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</span>
<h2>STEP 2 — STANDALONE / FULL AP NODES</h2>
<p>Standalone APs running in AP mode are independent devices — they do not receive keys from the main router automatically. You must add the public key to each one individually.</p>
<ol>
  <li>On each standalone AP, open its web interface and go to:<br>
    <strong>Administration → System → Authorized Keys</strong></li>
  <li>Paste the public key (the <code>ssh-ed25519 ...</code> line copied from the CLI log) and save</li>
  <li>Repeat for every standalone AP node</li>
</ol>
<div class="note-box">
  <strong>⚠️ Every standalone AP requires this step individually.</strong><br><br>
  Without the public key on a node, every SSH connection attempt will fail with an authentication error. The CLI log will show <code>SSH connection failed</code> for that node. The main router does not need to be rebooted.
</div>

<span class="sep">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</span>
<h2>VERIFYING THE INSTALLATION</h2>
<p>After keys are installed and any required node reboots are done:</p>
<ul>
  <li>Add each node's IP in the Nodes panel and click <strong>[Save Settings]</strong></li>
  <li>Click <strong>[Sync Nodes]</strong> and watch the CLI log</li>
  <li>A successful connection shows: <code>✓ SSH connection successful to &lt;IP&gt;</code></li>
  <li>A failed connection shows: <code>SSH connection failed</code> — key not yet active on that node</li>
</ul>

<span class="sep">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</span>
<h2>TROUBLESHOOTING</h2>
<table class="device-table">
  <thead><tr><th>Problem</th><th>Solution</th></tr></thead>
  <tbody>
    <tr><td>SSH connection failed on all nodes</td><td>Re-run [SSH Keys Install] to confirm the key exists. Check: <code>ls /jffs/addons/mervlan/.ssh/</code></td></tr>
    <tr><td>AiMesh node still failing after key was added to main router</td><td>The AiMesh node needs a reboot — Asus only propagates authorized keys to nodes during their boot process</td></tr>
    <tr><td>Standalone AP failing after key was pasted</td><td>Verify the key was pasted correctly and saved. The key is one line starting with <code>ssh-ed25519</code></td></tr>
    <tr><td>SSH stopped working after a firmware update</td><td>Firmware updates can wipe JFFS. Re-run [SSH Keys Install], then re-paste the key on all nodes and reboot AiMesh nodes</td></tr>
    <tr><td>Key already exists message</td><td>Normal — MerVLAN reuses an existing key pair. Re-install on nodes only if the key was regenerated</td></tr>
  </tbody>
</table>
<div class="nav-footer">Keys installed? Head to "Apply Changes" to go live →</div>
</div>`,

      wiki: `<div class="help-section">
<h2>WIKI — REFERENCE &amp; GLOSSARY</h2>
<span class="sep">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</span>
<p class="intro">Background reference for MerVLAN. Step-by-step guides are in the other tabs — this page covers what each script does, how they connect, and what technical terms mean.</p>

<span class="sep">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</span>
<h2>SCRIPTS</h2>
<p>MerVLAN is built from several shell scripts, each with a single responsibility.</p>
<table class="device-table">
  <thead><tr><th style="width:30%">Script</th><th>What it does</th></tr></thead>
  <tbody>
    <tr><td><code>mervlan_manager.sh</code></td><td>The core apply engine. Resolves SSIDs to wireless interfaces, creates per-VLAN bridges, binds interfaces to those bridges, and applies LAN port VLANs. Called during apply, on boot, and by the heal system.</td></tr>
    <tr><td><code>mervlan_trunk.sh</code></td><td>Handles trunk port configuration on the main router. Applies 802.1Q VLAN tagging rules on the designated LAN port. Called by the manager.</td></tr>
    <tr><td><code>mervlan_boot_wrap.sh</code></td><td>The boot entry point called by services-start on reboot. Waits up to 30s for wireless interfaces to become available, then calls mervlan_boot.sh.</td></tr>
    <tr><td><code>mervlan_boot.sh</code></td><td>Orchestrates the boot sequence. Calls the manager to re-apply VLANs and handles node boot coordination over SSH.</td></tr>
    <tr><td><code>service-event-handler.sh</code></td><td>Intercepts Asus firmware service events (e.g. restart_wireless). Forwards events that can affect VLAN state to the heal system.</td></tr>
    <tr><td><code>heal_event.sh</code></td><td>The VLAN health monitor. Runs every minute via cron. Checks whether bridges and interface bindings are intact. Triggers a re-apply via the manager if a persistent fault is detected.</td></tr>
    <tr><td><code>sync_nodes.sh</code></td><td>Copies MerVLAN files to each configured node over SSH. Rewrites settings.json per node before sending — trunk config is stripped and the node flag is set on the remote copy.</td></tr>
    <tr><td><code>execute_nodes.sh</code></td><td>Runs mervlan_manager.sh on each remote node via SSH. Used during "Local + Nodes" applies and remote enable/disable service commands.</td></tr>
    <tr><td><code>dropbear_sshkey_gen.sh</code></td><td>Generates the ED25519 key pair used for all node SSH connections. Stores keys in <code>/jffs/addons/mervlan/.ssh/</code>.</td></tr>
    <tr><td><code>hw_probe.sh</code></td><td>Probes the device to detect its hardware profile — identifies ethX interfaces, port count, and the WAN port.</td></tr>
    <tr><td><code>device_support_mapper.sh</code></td><td>Maps detected interfaces to physical port labels using the built-in device database. Flags the device for APMO if it is not recognized.</td></tr>
    <tr><td><code>save_settings.sh</code></td><td>Receives form data submitted from the UI and writes it to settings.json on the router.</td></tr>
    <tr><td><code>collect_clients.sh</code></td><td>Gathers connected client data from the main router and all nodes for the Clients Overview panel in the UI.</td></tr>
  </tbody>
</table>

<span class="sep">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</span>
<h2>HOW THE SCRIPTS CONNECT</h2>
<div class="scenario-block">
  <strong>Apply — single router</strong>
  UI saves via save_settings.sh → settings.json updated → mervlan_manager.sh applies bridges and bindings → mervlan_trunk.sh applies trunk config (if enabled)
</div>
<div class="scenario-block">
  <strong>Apply — with nodes</strong>
  mervlan_manager.sh (local) → sync_nodes.sh pushes files to each node → execute_nodes.sh runs mervlan_manager.sh on each node remotely
</div>
<div class="scenario-block">
  <strong>Boot — after reboot</strong>
  services-start → mervlan_boot_wrap.sh (waits for SSIDs) → mervlan_boot.sh → mervlan_manager.sh
</div>
<div class="scenario-block">
  <strong>Health monitoring — every minute</strong>
  cron → heal_event.sh checks VLAN state → mervlan_manager.sh re-applies if a fault persists
</div>
<div class="scenario-block">
  <strong>Firmware event — e.g. wireless restart</strong>
  Asus firmware fires service-event → service-event-handler.sh intercepts → heal_event.sh runs a health check → mervlan_manager.sh re-applies if needed
</div>

<span class="sep">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</span>
<h2>GLOSSARY</h2>
<p>Technical terms used across the guide, in plain language.</p>
<table class="device-table">
  <thead><tr><th style="width:22%">Term</th><th>Meaning</th></tr></thead>
  <tbody>
    <tr><td><strong>802.1Q</strong></td><td>IEEE standard for VLAN tagging on Ethernet frames. A small tag is added to each frame to indicate which VLAN it belongs to. Required by trunk ports and managed switches.</td></tr>
    <tr><td><strong>AiMesh</strong></td><td>Asus's mesh networking system. AiMesh nodes are managed by the main router and receive SSH authorized keys from it automatically after a reboot.</td></tr>
    <tr><td><strong>APMO</strong></td><td>Advanced Port Mapping Override. Lets you manually correct the hardware profile when automatic detection is wrong or the device is not in the built-in database.</td></tr>
    <tr><td><strong>Authorized Keys</strong></td><td>A file on each router listing SSH public keys that are allowed to connect without a password. MerVLAN's public key must be present here on every node.</td></tr>
    <tr><td><strong>Base radio</strong></td><td>The primary wireless interface for a band — wl0 (2.4 GHz), wl1 (5 GHz), wl2 (6 GHz). Assigning VLANs to base radios is possible but less stable than using Guest Network SSIDs.</td></tr>
    <tr><td><strong>br0</strong></td><td>The router's default LAN bridge. All interfaces are in br0 out of the box. MerVLAN moves relevant interfaces out of br0 and into dedicated per-VLAN bridges during apply.</td></tr>
    <tr><td><strong>Cron</strong></td><td>A time-based job scheduler built into the router OS. MerVLAN's health monitor runs as a cron job every minute when the service is enabled.</td></tr>
    <tr><td><strong>Dropbear</strong></td><td>The SSH server and client built into Asuswrt-Merlin. MerVLAN uses Dropbear's SSH client to connect from the main router to nodes.</td></tr>
    <tr><td><strong>Dry Run</strong></td><td>A MerVLAN mode where the full apply pipeline runs but no changes are committed to the network. ON by default — used to safely validate a config before going live.</td></tr>
    <tr><td><strong>ebtables</strong></td><td>A packet filtering tool that works at Layer 2 (Ethernet level). MerVLAN uses it to enforce VLAN isolation and quarantine rules on network bridges.</td></tr>
    <tr><td><strong>ED25519</strong></td><td>A modern SSH key algorithm. The type of key MerVLAN generates for authenticating from the main router to nodes.</td></tr>
    <tr><td><strong>ENS</strong></td><td>Enable Native SSID. A MerVLAN toggle that allows VLANs to be assigned to base radios. OFF by default — Guest Network SSIDs are recommended instead.</td></tr>
    <tr><td><strong>ethX</strong></td><td>Kernel names for Ethernet interfaces (eth0, eth1, eth2, etc.). Each physical LAN and WAN port on the router maps to one of these internally.</td></tr>
    <tr><td><strong>Guest SSID</strong></td><td>A secondary Wi-Fi network created under Wireless → Guest Network in the Asus UI. Uses a separate virtual interface (wl0.1, wl1.1, etc.) and is the recommended type for VLAN assignment.</td></tr>
    <tr><td><strong>Hardware profile</strong></td><td>A device-specific map of ethX interfaces to physical port labels, including which port is the WAN. MerVLAN needs this to know where to apply VLAN rules.</td></tr>
    <tr><td><strong>JFFS</strong></td><td>A writable flash filesystem on Asus routers, mounted at /jffs. Where MerVLAN is installed, settings are stored, and SSH keys live. Can be wiped by a factory reset or firmware update.</td></tr>
    <tr><td><strong>Node</strong></td><td>A secondary router or access point managed remotely by MerVLAN over SSH. Runs its own instance of MerVLAN in node mode.</td></tr>
    <tr><td><strong>Service event</strong></td><td>A firmware-generated signal that something changed on the router — for example, restart_wireless or dhcpc-up. MerVLAN monitors these to detect when VLAN state may have been disrupted.</td></tr>
    <tr><td><strong>services-start</strong></td><td>An Asuswrt-Merlin script that runs automatically when the router finishes booting. MerVLAN injects a call here to re-apply VLANs on every reboot.</td></tr>
    <tr><td><strong>SSH</strong></td><td>Secure Shell. An encrypted protocol for running commands on a remote device. MerVLAN uses SSH to sync files and run the VLAN manager on nodes.</td></tr>
    <tr><td><strong>SSID</strong></td><td>Service Set Identifier. The name of a Wi-Fi network as seen when scanning for networks.</td></tr>
    <tr><td><strong>STP</strong></td><td>Spanning Tree Protocol. Prevents network loops in topologies where multiple paths exist between devices. Relevant in multi-node setups with redundant links — leave OFF for single-router setups.</td></tr>
    <tr><td><strong>Trunk port</strong></td><td>An Ethernet port configured to carry tagged traffic for multiple VLANs simultaneously using 802.1Q. Requires a managed switch or downstream device that understands VLAN tags.</td></tr>
    <tr><td><strong>VLAN</strong></td><td>Virtual Local Area Network. Logically divides one physical network into isolated segments. Devices on different VLANs cannot communicate unless explicitly routed between them.</td></tr>
    <tr><td><strong>VLAN bridge</strong></td><td>A kernel network bridge dedicated to one VLAN (e.g. br20 for VLAN 20). MerVLAN creates one per VLAN ID and attaches the relevant wireless and wired interfaces to it.</td></tr>
    <tr><td><strong>VLAN ID</strong></td><td>A number between 2 and 4094 that identifies a specific VLAN. Interfaces and ports sharing the same VLAN ID are on the same network segment.</td></tr>
    <tr><td><strong>WAN</strong></td><td>Wide Area Network — the internet-facing port on the router. MerVLAN must correctly identify this port to avoid applying VLAN rules to it by mistake.</td></tr>
  </tbody>
</table>
</div>`
    };

    const contentEl = document.getElementById('content');
    const tabs = document.querySelectorAll('.tab');
    const HTML_SECTIONS = new Set(['start', 'ssid', 'lan', 'apply', 'ssh', 'logs', 'unsupported', 'support', 'wiki']);

    function showTab(tabName) {
      tabs.forEach(t => t.classList.remove('active'));
      document.querySelector(`.tab[data-tab="${tabName}"]`).classList.add('active');
      const content = SECTIONS[tabName] || "No content available.";
      if (HTML_SECTIONS.has(tabName)) {
        contentEl.innerHTML = content;
      } else {
        contentEl.textContent = content;
      }
      contentEl.scrollTop = 0;
    }

    tabs.forEach(tab => {
      tab.addEventListener('click', () => showTab(tab.getAttribute('data-tab')));
    });

    // Default to Getting Started tab
    showTab('start');
  </script>
