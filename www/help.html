<!DOCTYPE html>
<html>
<head>
  <!-- help.html version="0.52" -->
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MerVLAN VLAN Manager - Help & Usage Guide</title>
  <link rel="stylesheet" href="vendor/github-markdown-dark.css" />
  <style>
    html,
    body {
      height: 100%;
    }

    body {
      background: #1e1e1e;
      color: #dadada;
      font-family: Tahoma, Arial, sans-serif;
      margin: 0;
      padding: 15px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      text-align: center;
      margin-bottom: 15px;
      border-bottom: 1px solid #444;
      padding-bottom: 10px;
      flex: 0 0 auto;
    }

    .header h1 {
      color: #fff;
      margin: 0;
      font-size: 18px;
      line-height: 1.3;
    }

    .header .subtitle {
      margin-top: 5px;
      color: #9ca3af;
      font-size: 12px;
    }

    .content {
      background: #0d1117;
      border: 1px solid #444;
      border-radius: 8px 8px 0 0;
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #4a90e2 #1e1e1e;
    }

    .content::-webkit-scrollbar {
      width: 10px;
    }

    .content::-webkit-scrollbar-track {
      background: #1e1e1e;
    }

    .content::-webkit-scrollbar-thumb {
      background: #4a90e2;
      border-radius: 8px;
      border: 2px solid #1e1e1e;
    }

    .content::-webkit-scrollbar-thumb:hover {
      background: #357abd;
    }

    .markdown-body {
      box-sizing: border-box;
      max-width: 1040px;
      margin: 0 auto;
      padding: 28px;
      background: #0d1117;
      color: #c9d1d9;
    }

    .markdown-body img {
      max-width: 100%;
      height: auto;
    }

    .diagram-loading {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 72px;
      margin: 12px 0;
      padding: 12px;
      color: #9ca3af;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
    }

    .diagram-loading.is-error {
      color: #ff7b72;
      border-color: #f85149;
    }

    .markdown-body a {
      color: #58a6ff;
    }

    .markdown-body kbd {
      display: inline-block;
      padding: 3px 5px;
      font: 11px ui-monospace, SFMono-Regular, SFMono-Regular, Consolas, Liberation Mono, Menlo, monospace;
      line-height: 10px;
      color: #c9d1d9;
      vertical-align: middle;
      background-color: #161b22;
      border: solid 1px rgba(110, 118, 129, 0.4);
      border-bottom-color: rgba(110, 118, 129, 0.7);
      border-radius: 6px;
      box-shadow: inset 0 -1px 0 rgba(110, 118, 129, 0.4);
    }

    .markdown-alert {
      padding: 8px 16px;
      margin-bottom: 16px;
      color: #c9d1d9;
      border-left: 4px solid #3fb950;
      background: rgba(56, 139, 253, 0.06);
    }

    .markdown-alert > :last-child {
      margin-bottom: 0;
    }

    .markdown-alert-title {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 6px;
      font-weight: 600;
    }

    .markdown-alert-note {
      border-left-color: #1f6feb;
    }

    .markdown-alert-note .markdown-alert-title {
      color: #58a6ff;
    }

    .markdown-alert-tip {
      border-left-color: #238636;
    }

    .markdown-alert-tip .markdown-alert-title {
      color: #3fb950;
    }

    .markdown-alert-important {
      border-left-color: #8957e5;
    }

    .markdown-alert-important .markdown-alert-title {
      color: #a371f7;
    }

    .markdown-alert-warning {
      border-left-color: #d29922;
    }

    .markdown-alert-warning .markdown-alert-title {
      color: #d29922;
    }

    .markdown-alert-caution {
      border-left-color: #f85149;
    }

    .markdown-alert-caution .markdown-alert-title {
      color: #ff7b72;
    }

    .message {
      color: #9ca3af;
      padding: 24px;
      text-align: center;
    }

    .message.error {
      color: #ff7b72;
    }

    .button-bar {
      position: sticky;
      bottom: 0;
      display: flex;
      justify-content: flex-end;
      background: #1e1e1e;
      padding: 5px 0;
      border-top: 1px solid #444;
      flex: 0 0 auto;
    }

    button {
      background: #4a90e2;
      border: 1px solid #555;
      color: #fff;
      height: 28px;
      font-size: 14px;
      padding: 0 15px;
      border-radius: 4px;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    button:hover {
      background: #357abd;
    }

    .danger {
      background: #e74c3c;
    }

    .danger:hover {
      background: #c0392b;
    }

    @media (max-width: 720px) {
      body {
        padding: 10px;
      }

      .markdown-body {
        padding: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>MerVLAN Help &amp; Usage Guide</h1>
    <div class="subtitle">Loaded from docs/HELP.json</div>
  </div>

  <div class="content" id="content">
    <article class="markdown-body" id="helpContent">
      <div class="message">Loading help...</div>
    </article>
  </div>

  <div class="button-bar">
    <button class="danger" onclick="window.close()">Close</button>
  </div>

  <script src="vendor/marked.umd.js"></script>
  <script src="vendor/purify.min.js"></script>
  <script>
    (function () {
      var HELP_DOC = "docs/HELP.json";
      var contentEl = document.getElementById("content");
      var helpEl = document.getElementById("helpContent");
      var alertTitles = {
        note: "Note",
        tip: "Tip",
        important: "Important",
        warning: "Warning",
        caution: "Caution"
      };

      function setMessage(text, isError) {
        helpEl.innerHTML = "";
        var message = document.createElement("div");
        message.className = "message" + (isError ? " error" : "");
        message.textContent = text;
        helpEl.appendChild(message);
      }

      function getMarkedParser() {
        if (window.marked && typeof window.marked.parse === "function") {
          return window.marked;
        }
        if (window.marked && typeof window.marked === "function") {
          return window.marked;
        }
        return null;
      }

      function renderMarkdown(markdownText) {
        var markedParser = getMarkedParser();
        if (!markedParser) {
          throw new Error("Markdown renderer failed to load");
        }

        if (typeof markedParser.setOptions === "function") {
          markedParser.setOptions({
            gfm: true,
            breaks: false,
            silent: false
          });
        }

        var html = typeof markedParser.parse === "function"
          ? markedParser.parse(markdownText)
          : markedParser(markdownText);

        if (window.DOMPurify && typeof window.DOMPurify.sanitize === "function") {
          html = window.DOMPurify.sanitize(html, {
            ADD_ATTR: ["align", "target", "rel"]
          });
        }

        insertRenderedHtml(html);
        enhanceRenderedHelp();
      }

      function insertRenderedHtml(html) {
        var template = document.createElement("template");
        template.innerHTML = html;
        var diagrams = prepareDiagramImages(template.content);
        helpEl.innerHTML = "";
        helpEl.appendChild(template.content);
        loadDiagramImages(diagrams);
      }

      function enhanceRenderedHelp() {
        styleGitHubAlerts();
        prepareLinks();
        contentEl.scrollTop = 0;
      }

      function prepareDiagramImages(root) {
        var diagrams = [];
        var images = root.querySelectorAll("img[src]");
        Array.prototype.forEach.call(images, function (image) {
          var src = image.getAttribute("src") || "";
          if (!/^diagrams\/.+\.png$/i.test(src)) {
            image.setAttribute("loading", "lazy");
            image.setAttribute("decoding", "async");
            return;
          }

          var placeholder = document.createElement("div");
          placeholder.className = "diagram-loading";
          placeholder.textContent = "Loading diagram...";

          image.setAttribute("data-src", src);
          image.removeAttribute("src");
          image.setAttribute("decoding", "async");
          image.style.display = "none";

          image.parentNode.insertBefore(placeholder, image);
          diagrams.push({
            image: image,
            placeholder: placeholder,
            src: src
          });
        });
        return diagrams;
      }

      function loadDiagramImages(diagrams) {
        var queue = [];
        var loading = false;

        function enqueue(diagram) {
          queue.push(diagram);
          if (!loading) {
            loadNext();
          }
        }

        function loadNext() {
          var diagram = queue.shift();
          if (!diagram) {
            loading = false;
            return;
          }

          loading = true;
          var preload = new Image();
          preload.onload = function () {
            diagram.image.setAttribute("src", diagram.src);
            diagram.image.style.display = "";
            if (diagram.placeholder.parentNode) {
              diagram.placeholder.parentNode.removeChild(diagram.placeholder);
            }
            window.setTimeout(loadNext, 150);
          };
          preload.onerror = function () {
            diagram.placeholder.className = "diagram-loading is-error";
            diagram.placeholder.textContent = "Could not load diagram.";
            window.setTimeout(loadNext, 150);
          };
          preload.src = diagram.src;
        }

        if ("IntersectionObserver" in window) {
          var observer = new IntersectionObserver(function (entries) {
            Array.prototype.forEach.call(entries, function (entry) {
              if (!entry.isIntersecting) {
                return;
              }
              observer.unobserve(entry.target);
              enqueue(entry.target._diagram);
            });
          }, {
            root: contentEl,
            rootMargin: "160px 0px"
          });

          diagrams.forEach(function (diagram) {
            diagram.placeholder._diagram = diagram;
            observer.observe(diagram.placeholder);
          });
          return;
        }

        diagrams.forEach(enqueue);
      }

      function styleGitHubAlerts() {
        var blockquotes = helpEl.querySelectorAll("blockquote");
        Array.prototype.forEach.call(blockquotes, function (blockquote) {
          var firstParagraph = blockquote.querySelector("p");
          if (!firstParagraph) {
            return;
          }

          var match = firstParagraph.textContent.match(/^\s*\[!(NOTE|TIP|IMPORTANT|WARNING|CAUTION)\]\s*/i);
          if (!match) {
            return;
          }

          var alertType = match[1].toLowerCase();
          firstParagraph.innerHTML = firstParagraph.innerHTML.replace(
            /^\s*\[!(NOTE|TIP|IMPORTANT|WARNING|CAUTION)\]\s*(<br\s*\/?>)?\s*/i,
            ""
          );

          blockquote.classList.add("markdown-alert", "markdown-alert-" + alertType);

          var title = document.createElement("div");
          title.className = "markdown-alert-title";
          title.textContent = alertTitles[alertType] || alertType;
          blockquote.insertBefore(title, blockquote.firstChild);

          if (!firstParagraph.textContent.trim()) {
            firstParagraph.parentNode.removeChild(firstParagraph);
          }
        });
      }

      function prepareLinks() {
        var links = helpEl.querySelectorAll("a[href]");
        Array.prototype.forEach.call(links, function (link) {
          var href = link.getAttribute("href") || "";
          if (/^(https?:)?\/\//i.test(href)) {
            link.setAttribute("target", "_blank");
            link.setAttribute("rel", "noopener noreferrer");
          }
        });
      }

      function loadHelp() {
        setMessage("Loading help...", false);
        fetch(HELP_DOC)
          .then(function (response) {
            if (!response.ok) {
              throw new Error("HTTP " + response.status);
            }
            return response.text();
          })
          .then(renderMarkdown)
          .catch(function (error) {
            setMessage("Error loading " + HELP_DOC + ": " + error.message, true);
          });
      }

      loadHelp();
    })();
  </script>
</body>
</html>
